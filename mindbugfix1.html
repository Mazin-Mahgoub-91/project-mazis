<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mind to Image</title>
<style>
body{background:#0a0a0a;color:#0f0;font-family:Courier;text-align:center;padding:30px}
textarea{width:80%;height:80px;background:#000;color:#0f0;border:2px solid #0f0;font-size:18px;padding:10px}
button{padding:15px 40px;font-size:20px;margin:20px;background:#0f0;color:#000;border:none;cursor:pointer;font-weight:bold}
img{max-width:90%;border:3px solid #0f0;margin-top:20px}
#status{color:#ff0;margin:15px;font-size:18px}
</style>
</head>
<body>

<h1>Mind to Image v2</h1>
<p>اتخيل الصورة في راسك واكتب وصف سريع هنا:</p>

<textarea id="prompt" placeholder="مثال: قطة برتقالية لابسة نضارة EEG قاعدة في المريخ"></textarea>
<br>
<button id="generate">طلع الصورة من راسي</button>

<div id="status">اكتب وصفك واضغط الزر</div>
<img id="result" style="display:none">

<script>
const btn = document.getElementById('generate');
const status = document.getElementById('status');
const img = document.getElementById('result');

btn.onclick = async function(){
  const text = document.getElementById('prompt').value.trim();
  if(!text){
    status.textContent = 'اكتب لي وصف أول يا صديق';
    return;
  }
  
  status.textContent = 'بقرا أفكارك وبولد الصورة... انتظر 15 ثانية';
  btn.disabled = true;
  img.style.display = 'none';
  
  try{
    // حل مشكلة CORS: نستخدم proxy + timestamp عشان ما يتكاش
    const timestamp = Date.now();
    const url = https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?width=512&height=512&seed=${timestamp}&nologo=true;
    
    img.onload = function(){
      status.textContent = 'الصورة طلعت من راسك بنجاح! 🎉';
      btn.disabled = false;
    }
    img.onerror = function(){
      status.textContent = 'السيرفر زحمة، جرب تغير كلمة في الوصف وتضغط تاني';
      btn.disabled = false;
    }
    img.src = url;
    img.style.display = 'block';
    
  }catch(e){
    status.textContent = 'في مشكلة، جرب تاني: ' + e.message;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
